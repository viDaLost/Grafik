<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Журнал посещения</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./config.js"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-card card">
      <div class="top-row">
        <div>
          <div class="eyebrow">Telegram Mini App</div>
          <h1>Журнал</h1>
        </div>
        <div class="user-chip" id="userBadge">Вход…</div>
      </div>

      <div class="quick-grid">
        <div class="quick-card">
          <span>Дата</span>
          <input type="date" id="lessonDate">
        </div>
        <div class="quick-card stat-card">
          <span>Всего</span>
          <strong id="statTotal">0</strong>
        </div>
        <div class="quick-card stat-card success">
          <span>Были</span>
          <strong id="statPresent">0</strong>
        </div>
        <div class="quick-card stat-card danger">
          <span>Не были</span>
          <strong id="statAbsent">0</strong>
        </div>
      </div>
      <div class="access-note" id="accessNote">Проверяем права доступа…</div>
    </header>

    <nav class="segmented" aria-label="Разделы">
      <button class="segmented-btn active" data-tab="attendance">Посещение</button>
      <button class="segmented-btn" data-tab="students">Ученики</button>
      <button class="segmented-btn" data-tab="history">История</button>
    </nav>

    <main>
      <section class="tab-panel active" id="panel-attendance">
        <div class="toolbar-stack">
          <input type="search" id="searchInput" placeholder="Поиск ученика">
          <div class="filter-row" id="filterRow">
            <button class="filter-chip active" data-filter="all">Все</button>
            <button class="filter-chip" data-filter="absent">Пропустили</button>
            <button class="filter-chip" data-filter="present">Присутствовали</button>
          </div>
        </div>

        <div class="lesson-note-card card">
          <label class="field-label" style="font-size:12px; font-weight:600; color:var(--hint);" for="lessonNoteInput">Заметка к занятию</label>
          <textarea id="lessonNoteInput" placeholder="Мастер-класс, зачет и др..."></textarea>
          <div class="lesson-note-view" id="lessonNoteView">Заметка не указана.</div>
        </div>

        <div id="studentsList" class="attendance-list"></div>
      </section>

      <section class="tab-panel" id="panel-students">
        <div class="add-row">
          <input type="text" id="newStudentName" placeholder="Имя нового ученика">
          <button class="primary-btn" id="addStudentBtn">Добавить</button>
        </div>
        <div id="studentsAdminList" class="students-admin-list"></div>
      </section>

      <section class="tab-panel" id="panel-history">
        <div style="margin-bottom:12px; text-align:right;">
          <button class="danger-btn" id="clearHistoryBtn" style="padding:8px 12px; font-size:12px;">Очистить историю</button>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>
    </main>
  </div>

  <div class="native-bottom-bar" id="bottomBar">
    <button class="secondary-btn" id="markAllPresentBtn" style="flex:1;">Все были</button>
    <button class="primary-btn" id="saveBtn" style="flex:1.5;">Сохранить журнал</button>
  </div>

  <div class="modal-overlay hidden" id="reasonModal">
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <div class="eyebrow">Причина отсутствия</div>
          <h3 id="modalStudentName">Ученик</h3>
        </div>
        <button class="icon-btn" id="closeModalBtn">✕</button>
      </div>
      <div class="modal-body">
        <select id="reasonSelect"></select>
        <textarea id="reasonComment" placeholder="Дополнительный комментарий..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="secondary-btn" id="markPresentFromModalBtn">Был(а)</button>
        <button class="primary-btn" id="saveReasonBtn">Готово</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="historyModal">
    <div class="modal-card">
      <div class="modal-header">
        <h3 id="historyModalTitle">Детали сохранения</h3>
        <button class="icon-btn" id="closeHistoryModalBtn">✕</button>
      </div>
      <div class="modal-body" id="historyModalBody" style="max-height:60vh; overflow-y:auto;"></div>
    </div>
  </div>

  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loader-card"><div class="spinner"></div><p id="loadingText" style="margin:0; font-size:13px;">Загрузка…</p></div>
  </div>
  <div class="toast" id="toast"></div>

  <script src="./app.js"></script>
</body>
</html>
