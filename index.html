<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Журнал посещения</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="./config.js"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    
    <!-- Компактная шапка -->
    <header class="app-header">
      <div class="header-main">
        <div>
          <span class="eyebrow">Журнал</span>
          <h1 id="userBadge">Загрузка…</h1>
        </div>
        <div class="header-actions">
          <button class="icon-btn info-trigger" id="infoBtn" aria-label="Справка">ℹ️</button>
        </div>
      </div>

      <!-- Компактный навигатор по датам и краткая статистика -->
      <div class="control-strip">
        <div class="date-navigator">
          <button id="prevDateBtn" class="date-nav-btn" aria-label="Предыдущий день">◀</button>
          <div class="date-input-wrapper">
            <input type="date" id="lessonDate">
          </div>
          <button id="nextDateBtn" class="date-nav-btn" aria-label="Следующий день">▶</button>
        </div>

        <div class="mini-stats">
          <div class="mini-stat-item">
            <span class="label">Всего</span>
            <strong id="statTotal">0</strong>
          </div>
          <div class="mini-stat-item success">
            <span class="label">Были</span>
            <strong id="statPresent">0</strong>
          </div>
          <div class="mini-stat-item danger">
            <span class="label">Пропуски</span>
            <strong id="statAbsent">0</strong>
          </div>
        </div>
      </div>

      <div class="access-note hidden" id="accessNote">Проверяем права доступа…</div>
    </header>

    <!-- Основной контент -->
    <main class="app-content">
      
      <!-- ВКЛАДКА: ПОСЕЩЕНИЕ -->
      <section class="tab-panel active" id="panel-attendance">
        <!-- Поиск и фильтры -->
        <div class="search-filter-sticky">
          <div class="search-bar">
            <input type="search" id="searchInput" placeholder="Поиск ученика…">
          </div>
          <div class="filter-chips-scroll" id="filterRow">
            <button class="filter-chip active" data-filter="all">Все</button>
            <button class="filter-chip present" data-filter="present">Присутствующие</button>
            <button class="filter-chip absent" data-filter="absent">Отсутствующие</button>
          </div>
        </div>

        <div class="action-bar">
          <button class="ghost-btn" id="markAllPresentBtn">✅ Отметить всех</button>
          <button class="primary-btn save-action-btn" id="saveBtn">Сохранить журнал</button>
        </div>

        <!-- Поле заметки к уроку -->
        <div class="lesson-note-box">
          <textarea id="lessonNoteInput" placeholder="Добавить тему или заметку к уроку…"></textarea>
          <div class="lesson-note-view hidden" id="lessonNoteView"></div>
        </div>

        <div class="panel-info-alert" id="attendanceHelp">Отмечайте посещение за выбранную дату.</div>
        
        <!-- Список студентов для отметки -->
        <div id="studentsList" class="attendance-list"></div>
      </section>

      <!-- ВКЛАДКА: УЧЕНИКИ -->
      <section class="tab-panel" id="panel-students">
        <div class="panel-info-alert" id="studentsHelp">Список учеников и статистика посещаемости.</div>
        
        <!-- Добавление нового студента -->
        <div class="add-student-card">
          <input type="text" id="newStudentName" placeholder="ФИО нового ученика">
          <button class="primary-btn compact" id="addStudentBtn">Добавить</button>
        </div>

        <div id="studentsAdminList" class="students-admin-list"></div>
      </section>

      <!-- ВКЛАДКА: ИСТОРИЯ -->
      <section class="tab-panel" id="panel-history">
        <div class="panel-info-alert" id="historyHelp">История всех сохранений по датам.</div>
        
        <div class="history-actions-header">
          <button class="danger-btn text-only" id="clearHistoryBtn">⚠️ Очистить всю историю</button>
        </div>

        <div id="historyList" class="history-list"></div>
      </section>
    </main>

    <!-- Нижняя навигационная панель (Bottom Navigation) -->
    <nav class="bottom-nav">
      <button class="bottom-nav-btn active" data-tab="attendance">
        <span class="icon">📝</span>
        <span class="label">Журнал</span>
      </button>
      <button class="bottom-nav-btn" data-tab="students">
        <span class="icon">👥</span>
        <span class="label">Ученики</span>
      </button>
      <button class="bottom-nav-btn" data-tab="history">
        <span class="icon">🕒</span>
        <span class="label">История</span>
      </button>
    </nav>
  </div>

  <!-- Шторка снизу: Причина отсутствия (Bottom Sheet) -->
  <div class="modal-overlay hidden" id="reasonModal">
    <div class="bottom-sheet">
      <div class="sheet-drag-handle"></div>
      <div class="modal-header">
        <div>
          <div class="eyebrow">Причина отсутствия</div>
          <h3 id="modalStudentName">Ученик</h3>
        </div>
        <button class="close-sheet-btn" id="closeModalBtn" aria-label="Закрыть">✕</button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label class="field-label" for="reasonSelect">Выберите причину</label>
          <select id="reasonSelect"></select>
        </div>

        <div class="form-group">
          <label class="field-label" for="reasonComment">Комментарий</label>
          <textarea id="reasonComment" placeholder="Дополнительные детали…"></textarea>
        </div>
      </div>

      <div class="modal-actions-sheet">
        <button class="secondary-btn" id="markPresentFromModalBtn">Был(а)</button>
        <button class="primary-btn" id="saveReasonBtn">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Шторка снизу: Точный список (Bottom Sheet) -->
  <div class="modal-overlay hidden" id="historyModal">
    <div class="bottom-sheet history-sheet">
      <div class="sheet-drag-handle"></div>
      <div class="modal-header">
        <div>
          <div class="eyebrow">Детали занятия</div>
          <h3 id="historyModalTitle">Сохранение</h3>
        </div>
        <button class="close-sheet-btn" id="closeHistoryModalBtn" aria-label="Закрыть">✕</button>
      </div>

      <div class="modal-body history-modal-body" id="historyModalBody"></div>
    </div>
  </div>

  <!-- Лоадер -->
  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loader-card">
      <div class="spinner"></div>
      <p id="loadingText">Загрузка…</p>
    </div>
  </div>

  <!-- Тосты -->
  <div class="toast" id="toast"></div>

  <script src="./app.js"></script>
</body>
</html>
